<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Timer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a2e;
      padding: 20px 0;
    }

    .card {
      width: 340px;
      min-height: 680px;
      border-radius: 40px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 48px 28px 36px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
      transition: background 0.6s cubic-bezier(0.4,0,0.2,1);
    }

    /* Top pill */
    .top-pill {
      display: flex;
      align-items: center;
      gap: 12px;
      border-radius: 30px;
      padding: 6px 16px 6px 6px;
      margin-bottom: 32px;
      animation: fadeSlideIn 0.4s ease;
    }
    .top-icon {
      width: 48px; height: 48px;
      border-radius: 24px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .top-text {
      color: white;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.02em;
    }

    /* Title */
    .title-section {
      margin-bottom: 40px;
      text-align: center;
      animation: fadeSlideIn 0.5s ease 0.05s both;
    }
    .title-section h1 {
      color: white;
      font-size: 26px;
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: -0.01em;
    }
    .subtitle {
      color: #3D2A00;
      font-weight: 800;
      font-size: 18px;
      margin-top: 6px;
    }

    /* Timer */
    .timer-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .timer-display {
      font-size: 88px;
      font-weight: 900;
      color: white;
      line-height: 1;
      letter-spacing: -0.03em;
      font-variant-numeric: tabular-nums;
    }
    .timer-display.pulsing {
      animation: pulseGlow 2s ease-in-out infinite;
    }
    .time-label {
      color: rgba(255,255,255,0.7);
      font-size: 15px;
      font-weight: 500;
    }

    /* Wave */
    .wave-wrapper {
      margin: 28px -4px;
    }
    .wave-bar {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 60px;
      width: 100%;
      overflow: hidden;
    }
    .wave-bar .bar {
      flex: 1;
      border-radius: 2px;
    }
    .wave-bar.active .bar {
      animation: wave var(--dur) ease-in-out infinite alternate;
      animation-delay: var(--delay);
    }

    /* Bottom */
    .bottom-section { margin-top: 8px; }

    /* Swipe button */
    .swipe-track {
      position: relative;
      height: 60px;
      border-radius: 30px;
      background: rgba(255,255,255,0.18);
      overflow: hidden;
      user-select: none;
      cursor: pointer;
    }
    .swipe-label {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      color: rgba(255,255,255,0.85);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.05em;
      pointer-events: none;
      white-space: nowrap;
    }
    .swipe-thumb {
      position: absolute;
      left: 4px; top: 4px;
      width: 52px; height: 52px;
      border-radius: 26px;
      background: white;
      display: flex; align-items: center; justify-content: center;
      cursor: grab;
      touch-action: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .swipe-thumb.dragging { transition: none; }
    .swipe-arrow { font-size: 18px; animation: swipeArrow 1.2s ease-in-out infinite; display: block; }

    /* Bottom pill (non-idle) */
    .bottom-pill {
      border-radius: 30px;
      height: 60px;
      display: flex; align-items: center; justify-content: center;
    }
    .bottom-pill span {
      color: white;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.02em;
    }
    .bottom-pill.clickable { cursor: pointer; }

    /* Give up button */
    .give-up-btn {
      margin-top: 12px;
      background: rgba(255,255,255,0.12);
      border: none;
      border-radius: 20px;
      padding: 8px 20px;
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }

    /* Confetti */
    .confetti-layer {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      overflow: hidden;
    }
    .confetti-piece {
      position: absolute; top: 0;
      border-radius: 2px;
    }

    /* Animations */
    @keyframes wave {
      0%   { transform: scaleY(0.5); opacity: 0.5; }
      100% { transform: scaleY(1);   opacity: 1; }
    }
    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
      100% { transform: translateY(700px) rotate(720deg); opacity: 0; }
    }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.85; }
      50%       { opacity: 1; }
    }
    @keyframes swipeArrow {
      0%, 100% { transform: translateX(0);   opacity: 0.7; }
      50%       { transform: translateX(6px); opacity: 1; }
    }
  </style>
</head>
<body>

<div class="card" id="card">

  <!-- Confetti (shown only on DONE) -->
  <div class="confetti-layer" id="confetti" style="display:none"></div>

  <!-- Top pill -->
  <div class="top-pill" id="topPill">
    <div class="top-icon" id="topIcon"></div>
    <span class="top-text" id="topText"></span>
  </div>

  <!-- Title -->
  <div class="title-section">
    <h1 id="taskTitle"></h1>
    <p class="subtitle">Techbabby</p>
  </div>

  <!-- Timer -->
  <div class="timer-section">
    <div class="timer-display" id="timerDisplay">0:01</div>
    <p class="time-label">Time count</p>
  </div>

  <!-- Wave -->
  <div class="wave-wrapper">
    <div class="wave-bar" id="waveBar"></div>
  </div>

  <!-- Bottom action -->
  <div class="bottom-section" id="bottomSection"></div>

</div>

<script>
  const STATES = { IDLE: "idle", RUNNING: "running", DONE: "done", FAILED: "failed" };
  let screen = STATES.IDLE;
  let seconds = 1;
  let finalTime = 60;
  let timerInterval = null;

  const WAVE_HEIGHTS = [
    0.4,0.7,1,0.6,0.9,0.5,0.8,0.3,0.7,0.5,
    0.9,0.4,0.6,1,0.7,0.3,0.8,0.6,0.4,0.9,
    0.5,0.7,0.3,1,0.6,0.8,0.4,0.5,0.9,0.7,
    0.3,0.6,1,0.5,0.8,0.4,0.7,0.9,0.3,0.6
  ];

  function formatTime(s) {
    return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, "0")}`;
  }

  function buildWave() {
    const bar = document.getElementById("waveBar");
    bar.innerHTML = "";
    WAVE_HEIGHTS.forEach((h, i) => {
      const div = document.createElement("div");
      div.className = "bar";
      div.style.height = `${h * 100}%`;
      div.style.setProperty("--dur", `${0.8 + (i % 5) * 0.15}s`);
      div.style.setProperty("--delay", `${(i % 8) * 0.07}s`);
      bar.appendChild(div);
    });
  }

  function setWaveColor(color) {
    document.querySelectorAll(".wave-bar .bar").forEach(b => b.style.background = color);
  }

  function buildConfetti() {
    const pieces = [
      { left: 10, color: "#FF6B35", size: 12, delay: 0 },
      { left: 25, color: "#4CAF50", size: 10, delay: 2 },
      { left: 40, color: "#E91E8C", size: 14, delay: 1 },
      { left: 55, color: "#FFD700", size: 10, delay: 3 },
      { left: 70, color: "#4CAF50", size: 12, delay: 0 },
      { left: 85, color: "#FF6B35", size: 8,  delay: 2 },
      { left: 15, color: "#4CAF50", size: 10, delay: 4 },
      { left: 60, color: "#E91E8C", size: 12, delay: 1 },
      { left: 78, color: "#FFD700", size: 14, delay: 3 },
      { left: 35, color: "#FF6B35", size: 10, delay: 2 },
      { left: 92, color: "#4CAF50", size: 8,  delay: 1 },
      { left: 5,  color: "#E91E8C", size: 12, delay: 0 },
    ];
    const layer = document.getElementById("confetti");
    layer.innerHTML = "";
    pieces.forEach(p => {
      const el = document.createElement("div");
      el.className = "confetti-piece";
      el.style.cssText = `
        left:${p.left}%;
        width:${p.size}px; height:${p.size * 0.6}px;
        background:${p.color};
        animation: confettiFall ${1.8 + p.delay * 0.4}s ease-in forwards;
        animation-delay: ${p.delay * 0.1}s;
      `;
      layer.appendChild(el);
    });
  }

  // ── Swipe button ──────────────────────────────────────────────
  function buildSwipeButton(onComplete) {
    const track = document.createElement("div");
    track.className = "swipe-track";

    const label = document.createElement("span");
    label.className = "swipe-label";
    label.textContent = "Swipe to start your task";

    const thumb = document.createElement("div");
    thumb.className = "swipe-thumb";
    thumb.innerHTML = `<span class="swipe-arrow">»</span>`;

    track.appendChild(label);
    track.appendChild(thumb);

    const maxX = 220;
    let dragging = false;
    let startX = 0;
    let currentX = 0;

    function setX(val) {
      currentX = Math.max(0, Math.min(maxX, val));
      thumb.style.transform = `translateX(${currentX}px)`;
      if (currentX >= maxX - 4) { dragging = false; onComplete(); }
    }

    thumb.addEventListener("pointerdown", e => {
      dragging = true;
      startX = e.clientX - currentX;
      thumb.classList.add("dragging");
      thumb.setPointerCapture(e.pointerId);
    });
    thumb.addEventListener("pointermove", e => {
      if (!dragging) return;
      setX(e.clientX - startX);
    });
    thumb.addEventListener("pointerup", () => {
      if (dragging) { dragging = false; thumb.classList.remove("dragging"); setX(0); }
    });

    return track;
  }

  // ── State machine ─────────────────────────────────────────────
  function startTimer() {
    screen = STATES.RUNNING;
    seconds = 1;
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      seconds++;
      render();
      if (seconds >= 60) {
        clearInterval(timerInterval);
        finalTime = seconds;
        screen = STATES.DONE;
        render();
      }
    }, 1000);
    render();
  }

  function markFailed() {
    clearInterval(timerInterval);
    finalTime = seconds;
    screen = STATES.FAILED;
    render();
  }

  function reset() {
    clearInterval(timerInterval);
    seconds = 1;
    screen = STATES.IDLE;
    render();
  }

  // ── Render ────────────────────────────────────────────────────
  function render() {
    const card        = document.getElementById("card");
    const confetti    = document.getElementById("confetti");
    const topPill     = document.getElementById("topPill");
    const topIcon     = document.getElementById("topIcon");
    const topTextEl   = document.getElementById("topText");
    const taskTitle   = document.getElementById("taskTitle");
    const timerDisp   = document.getElementById("timerDisplay");
    const waveBar     = document.getElementById("waveBar");
    const bottomSec   = document.getElementById("bottomSection");

    const configs = {
      [STATES.IDLE]: {
        bg: "#5B4FE8",
        topBg: "rgba(255,255,255,0.18)",
        topIconHtml: `<div style="width:48px;height:48px;border-radius:24px;background:white;display:flex;align-items:center;justify-content:center"><span style="font-size:20px;animation:swipeArrow 1.2s ease-in-out infinite">»</span></div>`,
        topText: "Swipe to start your task",
        title: "Start your Morning Run",
        timeDisplay: formatTime(seconds),
        waveColor: "rgba(255,255,255,0.45)",
        waveActive: false,
        bottomBg: "rgba(255,255,255,0.18)",
        bottomText: "You can do this 💪",
        bottomClickable: false,
        showGiveUp: false,
        showSwipe: true,
        showConfetti: false,
      },
      [STATES.RUNNING]: {
        bg: "#5B4FE8",
        topBg: "rgba(255,255,255,0.18)",
        topIconHtml: `<div style="width:48px;height:48px;border-radius:24px;background:white;display:flex;align-items:center;justify-content:center"><span style="font-size:18px;color:#5B4FE8">▶</span></div>`,
        topText: "Task in progress…",
        title: "Start your Morning Run",
        timeDisplay: formatTime(seconds),
        waveColor: "rgba(255,255,255,0.55)",
        waveActive: true,
        bottomBg: "rgba(255,255,255,0.18)",
        bottomText: "You can do this 💪",
        bottomClickable: false,
        showGiveUp: true,
        showSwipe: false,
        showConfetti: false,
      },
      [STATES.DONE]: {
        bg: "#3D9BDC",
        topBg: "rgba(255,255,255,0.2)",
        topIconHtml: `<div style="width:48px;height:48px;border-radius:24px;background:#4CAF50;display:flex;align-items:center;justify-content:center"><span style="color:white;font-size:22px;font-weight:700">✓</span></div>`,
        topText: "Task Completed Successfully",
        title: "Morning Run Completed!",
        timeDisplay: formatTime(finalTime),
        waveColor: "rgba(255,255,255,0.65)",
        waveActive: false,
        bottomBg: "rgba(255,255,255,0.2)",
        bottomText: "Good Babe 👏🔥",
        bottomClickable: true,
        bottomAction: reset,
        bottomActionLabel: "Start Again",
        showGiveUp: false,
        showSwipe: false,
        showConfetti: true,
      },
      [STATES.FAILED]: {
        bg: "#E85444",
        topBg: "rgba(255,255,255,0.15)",
        topIconHtml: `<div style="width:48px;height:48px;border-radius:24px;background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.6);display:flex;align-items:center;justify-content:center"><span style="color:white;font-size:20px">⚠</span></div>`,
        topText: "Task Hanging",
        title: "Task not Completed",
        timeDisplay: formatTime(finalTime),
        waveColor: "rgba(255,255,255,0.35)",
        waveActive: false,
        bottomBg: "rgba(255,255,255,0.15)",
        bottomText: "What Happened 😫?",
        bottomClickable: true,
        bottomAction: reset,
        bottomActionLabel: "Try Again",
        showGiveUp: false,
        showSwipe: false,
        showConfetti: false,
      },
    };

    const cfg = configs[screen];

    // Card background
    card.style.background = cfg.bg;

    // Confetti
    if (cfg.showConfetti) {
      confetti.style.display = "block";
      buildConfetti();
    } else {
      confetti.style.display = "none";
    }

    // Top pill
    topPill.style.background = cfg.topBg;
    topIcon.innerHTML = cfg.topIconHtml;
    topTextEl.textContent = cfg.topText;

    // Title
    taskTitle.textContent = cfg.title;

    // Timer
    timerDisp.textContent = cfg.timeDisplay;
    timerDisp.classList.toggle("pulsing", screen === STATES.RUNNING);

    // Wave
    setWaveColor(cfg.waveColor);
    waveBar.classList.toggle("active", cfg.waveActive);

    // Bottom
    bottomSec.innerHTML = "";
    if (cfg.showSwipe) {
      bottomSec.appendChild(buildSwipeButton(startTimer));
    } else {
      const pill = document.createElement("div");
      pill.className = "bottom-pill" + (cfg.bottomClickable ? " clickable" : "");
      pill.style.background = cfg.bottomBg;
      pill.innerHTML = `<span>${cfg.bottomClickable ? cfg.bottomActionLabel : cfg.bottomText}</span>`;
      if (cfg.bottomClickable && cfg.bottomAction) {
        pill.addEventListener("click", cfg.bottomAction);
      }
      bottomSec.appendChild(pill);

      if (cfg.showGiveUp) {
        const btn = document.createElement("button");
        btn.className = "give-up-btn";
        btn.textContent = "Mark as failed";
        btn.addEventListener("click", markFailed);
        bottomSec.appendChild(btn);
      }
    }
  }

  // ── Init ──────────────────────────────────────────────────────
  buildWave();
  render();
</script>
</body>
</html>
