<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Habit App</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent; }

    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }

    .app { width: 100%; height: 100dvh; position: relative; overflow: hidden; }

    /* Screens */
    .screen {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      transform: translateX(100%);
      transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
      display: none;
    }
    .screen.active {
      display: block;
      transform: translateX(0);
    }

    /* ══ TIMER SCREEN ══ */
    #screen-timer {
      background: #5B4FE8;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: env(safe-area-inset-top, 20px) 0 env(safe-area-inset-bottom, 20px);
    }

    .top-pill {
      display: flex; align-items: center; gap: 12px;
      border-radius: 30px; padding: 6px 16px 6px 6px;
      margin: 20px 20px 0;
    }
    .top-icon { width: 48px; height: 48px; border-radius: 24px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .top-text { color: white; font-weight: 700; font-size: 13px; }

    .title-section { margin: 24px 20px 0; text-align: center; }
    .title-section h1 { color: white; font-size: clamp(20px, 6vw, 26px); font-weight: 800; line-height: 1.2; }
    .subtitle { color: rgba(255,255,255,0.55); font-weight: 700; font-size: 15px; margin-top: 5px; }

    .timer-section { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; padding: 0 20px; }
    .timer-display { font-size: clamp(72px, 22vw, 96px); font-weight: 900; color: white; line-height: 1; letter-spacing: -0.03em; font-variant-numeric: tabular-nums; }
    .timer-display.pulsing { animation: pulseGlow 2s ease-in-out infinite; }
    .time-label { color: rgba(255,255,255,0.7); font-size: 15px; font-weight: 500; }

    .wave-wrapper { margin: 20px 16px; }
    .wave-bar { display: flex; align-items: center; gap: 3px; height: 56px; width: 100%; overflow: hidden; }
    .wave-bar .bar { flex: 1; border-radius: 2px; }
    .wave-bar.active .bar { animation: wave var(--dur) ease-in-out infinite alternate; animation-delay: var(--delay); }

    .bottom-section { padding: 0 20px 32px; }

    .swipe-track { position: relative; height: 60px; border-radius: 30px; background: rgba(255,255,255,0.18); overflow: hidden; user-select: none; }
    .swipe-label { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); color: rgba(255,255,255,0.85); font-size: 14px; font-weight: 600; pointer-events: none; white-space: nowrap; }
    .swipe-thumb { position: absolute; left: 4px; top: 4px; width: 52px; height: 52px; border-radius: 26px; background: white; display: flex; align-items: center; justify-content: center; cursor: grab; touch-action: none; box-shadow: 0 2px 8px rgba(0,0,0,0.15); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); }
    .swipe-thumb.dragging { transition: none; }
    .swipe-arrow { font-size: 18px; animation: swipeArrow 1.2s ease-in-out infinite; display: block; }

    .bottom-pill { border-radius: 30px; height: 60px; display: flex; align-items: center; justify-content: center; }
    .bottom-pill span { color: white; font-weight: 700; font-size: 15px; }
    .bottom-pill.clickable { cursor: pointer; }
    .give-up-btn { margin-top: 12px; background: rgba(255,255,255,0.12); border: none; border-radius: 20px; padding: 10px 20px; color: rgba(255,255,255,0.7); font-size: 13px; font-weight: 600; cursor: pointer; width: 100%; }

    .confetti-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: 999; }
    .confetti-piece { position: absolute; top: 0; border-radius: 2px; }

    /* ══ PROFILE SCREEN ══ */
    #screen-profile {
      background: #f5f0e8;
      min-height: 100dvh;
    }

    .profile-header {
      background: #ede8f5;
      padding: calc(env(safe-area-inset-top, 0px) + 48px) 24px 28px;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      position: relative;
    }
    .ph-back {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0px) + 20px);
      left: 20px;
      width: 36px; height: 36px; border-radius: 50%;
      border: 1.5px solid #c0b8dc; background: transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: #6b5fa0; font-size: 22px;
    }
    .avatar-wrap { width: 84px; height: 84px; border-radius: 50%; overflow: hidden; border: 3px solid white; box-shadow: 0 3px 14px rgba(0,0,0,0.15); }
    .avatar-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .p-name { font-size: 22px; font-weight: 900; color: #5a3fbf; margin-top: 4px; }
    .p-level { font-size: 13px; color: #aaa; font-weight: 600; }

    .profile-body { padding: 20px 20px 40px; }

    .invite-card { background: #d4e84a; border-radius: 18px; padding: 16px 18px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
    .invite-title { font-size: 15px; font-weight: 800; color: #3a3a2a; margin-bottom: 8px; }
    .invite-code { background: #f4742a; color: white; font-size: 12px; font-weight: 800; padding: 5px 14px; border-radius: 20px; display: inline-block; }

    .menu-item { display: flex; align-items: center; justify-content: space-between; padding: 18px 4px; border-bottom: 1px solid rgba(0,0,0,0.07); cursor: pointer; }
    .menu-item:last-child { border-bottom: none; }
    .menu-left { display: flex; align-items: center; gap: 14px; }
    .menu-icon { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }
    .menu-text { font-size: 15px; font-weight: 600; color: #2a2a2a; }
    .menu-arrow { color: #ccc; font-size: 18px; }
    .signout-item { display: flex; align-items: center; gap: 14px; padding: 18px 4px; cursor: pointer; margin-top: 4px; }
    .signout-text { font-size: 15px; font-weight: 700; color: #e03030; }

    /* ══ TASK DETAIL SCREEN ══ */
    #screen-task {
      background: #f5f0e8;
      min-height: 100dvh;
    }

    .task-hero { width: 100%; height: 42vmax; max-height: 320px; min-height: 220px; position: relative; overflow: hidden; }
    .task-hero img { width: 100%; height: 100%; object-fit: cover; }
    .task-hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(40,60,160,0.2) 0%, rgba(245,240,232,0.5) 100%); }
    .task-back {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0px) + 16px);
      left: 16px;
      width: 40px; height: 40px; border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.8);
      background: rgba(255,255,255,0.18);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: white; font-size: 24px;
      backdrop-filter: blur(6px);
    }

    .task-body { padding: 28px 24px 40px; position: relative; }
    .task-title { font-size: clamp(28px, 9vw, 36px); font-weight: 900; color: #2d2510; margin-bottom: 10px; letter-spacing: -0.5px; }
    .task-desc { font-size: 14px; color: #5a4e30; line-height: 1.7; margin-bottom: 28px; }
    .task-field { margin-bottom: 22px; }
    .task-field-label { font-size: 13px; color: #9a8a6a; font-weight: 600; margin-bottom: 5px; }
    .task-field-value { font-size: 16px; font-weight: 800; color: #2d2510; }
    .edit-fab {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 24px);
      right: 24px;
      width: 56px; height: 56px; border-radius: 50%;
      background: #6b5bf0;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; box-shadow: 0 4px 20px rgba(107,91,240,0.45); z-index: 10;
    }
    .edit-fab svg { width: 22px; height: 22px; stroke: white; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    @keyframes wave { 0% { transform: scaleY(0.5); opacity: 0.5; } 100% { transform: scaleY(1); opacity: 1; } }
    @keyframes confettiFall { 0% { transform: translateY(-20px) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
    @keyframes pulseGlow { 0%, 100% { opacity: 0.85; } 50% { opacity: 1; } }
    @keyframes swipeArrow { 0%, 100% { transform: translateX(0); opacity: 0.7; } 50% { transform: translateX(6px); opacity: 1; } }
  </style>
</head>
<body>
<div class="app">

  <!-- SCREEN 1: TIMER -->
  <div class="screen active" id="screen-timer">
    <div id="confetti" style="display:none" class="confetti-layer"></div>
    <div class="top-pill" id="topPill">
      <div class="top-icon" id="topIcon"></div>
      <span class="top-text" id="topText"></span>

    <div class="title-section">
      <h1 id="taskTitle"></h1>
      <p class="subtitle">Techbaby</p>
    </div>
    <div class="timer-section">
      <div class="timer-display" id="timerDisplay">0:01</div>
      <p class="time-label">Time count</p>
    </div>
    <div class="wave-wrapper">
      <div class="wave-bar" id="waveBar"></div>
    </div>
    <div class="bottom-section" id="bottomSection"></div>
  </div>

<script>
  let current = 'timer';

  function navigate(name) {
    if (name === current) return;
    document.getElementById('screen-' + current).classList.remove('active');
    document.getElementById('screen-' + name).classList.add('active');
    current = name;
  }

  /* Timer */
  const STATES = { IDLE:'idle', RUNNING:'running', DONE:'done', FAILED:'failed' };
  let tState = STATES.IDLE, seconds = 1, finalTime = 60, timerInterval = null;

  function buildWave() {
    const bar = document.getElementById('waveBar'); bar.innerHTML = '';
    WAVE_H.forEach((h,i) => { const d = document.createElement('div'); d.className = 'bar'; d.style.height = `${h*100}%`; d.style.setProperty('--dur',`${0.8+(i%5)*0.15}s`); d.style.setProperty('--delay',`${(i%8)*0.07}s`); bar.appendChild(d); });

  function setWaveColor(c) { document.querySelectorAll('.wave-bar .bar').forEach(b => b.style.background = c); }

  function buildConfetti() {
    const pieces = [{l:10,c:'#FF6B35',s:12,d:0},{l:25,c:'#4CAF50',s:10,d:2},{l:40,c:'#E91E8C',s:14,d:1},{l:55,c:'#FFD700',s:10,d:3},{l:70,c:'#4CAF50',s:12,d:0},{l:85,c:'#FF6B35',s:8,d:2},{l:15,c:'#4CAF50',s:10,d:4},{l:60,c:'#E91E8C',s:12,d:1},{l:78,c:'#FFD700',s:14,d:3},{l:35,c:'#FF6B35',s:10,d:2},{l:92,c:'#4CAF50',s:8,d:1},{l:5,c:'#E91E8C',s:12,d:0}];
    const layer = document.getElementById('confetti'); layer.innerHTML = '';
    pieces.forEach(p => { const el = document.createElement('div'); el.className='confetti-piece'; el.style.cssText=`left:${p.l}%;width:${p.s}px;height:${p.s*.6}px;background:${p.c};animation:confettiFall ${1.8+p.d*.4}s ease-in forwards;animation-delay:${p.d*.1}s;`; layer.appendChild(el); });
  }

  function buildSwipe(onComplete) {
    const track = document.createElement('div'); track.className = 'swipe-track';
    const label = document.createElement('span'); label.className = 'swipe-label'; label.textContent = 'Swipe to start your task';
    const thumb = document.createElement('div'); thumb.className = 'swipe-thumb'; thumb.innerHTML = '<span class="swipe-arrow">»</span>';
    track.appendChild(label); track.appendChild(thumb);
    let dragging=false, startX=0, cx=0;
    const maxX = window.innerWidth - 88;
    function setX(v) { cx=Math.max(0,Math.min(maxX,v)); thumb.style.transform=`translateX(${cx}px)`; if(cx>=maxX-4){dragging=false;onComplete();} }
    thumb.addEventListener('pointerdown', e => { dragging=true; startX=e.clientX-cx; thumb.classList.add('dragging'); thumb.setPointerCapture(e.pointerId); });
    thumb.addEventListener('pointermove', e => { if(dragging) setX(e.clientX-startX); });
    thumb.addEventListener('pointerup', () => { if(dragging){dragging=false;thumb.classList.remove('dragging');setX(0);} });
    return track;
  }

  function startTimer() { tState=STATES.RUNNING; seconds=1; clearInterval(timerInterval); timerInterval=setInterval(()=>{ seconds++; render(); if(seconds>=60){clearInterval(timerInterval);finalTime=seconds;tState=STATES.DONE;render();}},1000); render(); }
  function markFailed() { clearInterval(timerInterval); finalTime=seconds; tState=STATES.FAILED; render(); }
  function reset() { clearInterval(timerInterval); seconds=1; tState=STATES.IDLE; render(); }

  function render() {
    const C = {
      idle:    { bg:'#5B4FE8', tBg:'rgba(255,255,255,0.18)', tIcon:`<div style="width:48px;height:48px;border-radius:24px;background:white;display:flex;align-items:center;justify-content:center"><span style="font-size:20px;animation:swipeArrow 1.2s ease-in-out infinite">»</span></div>`, tTxt:'Swipe to start your task', title:'Start your Morning Run', wC:'rgba(255,255,255,0.45)', wA:false, bBg:'rgba(255,255,255,0.18)', bTxt:'You can do this 💪', bClick:false, giveUp:false, swipe:true, confetti:false },
      running: { bg:'#5B4FE8', tBg:'rgba(255,255,255,0.18)', tIcon:`<div style="width:48px;height:48px;border-radius:24px;background:white;display:flex;align-items:center;justify-content:center"><span style="font-size:18px;color:#5B4FE8">▶</span></div>`, tTxt:'Task in progress…', title:'Start your Morning Run', wC:'rgba(255,255,255,0.55)', wA:true, bBg:'rgba(255,255,255,0.18)', bTxt:'You can do this 💪', bClick:false, giveUp:true, swipe:false, confetti:false },
      done:    { bg:'#3D9BDC', tBg:'rgba(255,255,255,0.2)', tIcon:`<div style="width:48px;height:48px;border-radius:24px;background:#4CAF50;display:flex;align-items:center;justify-content:center"><span style="color:white;font-size:22px;font-weight:700">✓</span></div>`, tTxt:'Task Completed!', title:'Morning Run Done!', wC:'rgba(255,255,255,0.65)', wA:false, bBg:'rgba(255,255,255,0.2)', bTxt:'Good Babe 👏🔥', bClick:true, bAction:reset, bLabel:'Start Again', giveUp:false, swipe:false, confetti:true },
      failed:  { bg:'#E85444', tBg:'rgba(255,255,255,0.15)', tIcon:`<div style="width:48px;height:48px;border-radius:24px;background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.6);display:flex;align-items:center;justify-content:center"><span style="color:white;font-size:20px">⚠</span></div>`, tTxt:'Task Hanging', title:'Task not Completed', wC:'rgba(255,255,255,0.35)', wA:false, bBg:'rgba(255,255,255,0.15)', bTxt:'What Happened 😫?', bClick:true, bAction:reset, bLabel:'Try Again', giveUp:false, swipe:false, confetti:false },
    };
    const cfg = C[tState];
    document.getElementById('screen-timer').style.background = cfg.bg;
    const confetti = document.getElementById('confetti');
    cfg.confetti ? (confetti.style.display='block', buildConfetti()) : (confetti.style.display='none');
    document.getElementById('topPill').style.background = cfg.tBg;
    document.getElementById('topIcon').innerHTML = cfg.tIcon;
    document.getElementById('topText').textContent = cfg.tTxt;
    document.getElementById('taskTitle').textContent = cfg.title;
    const td = document.getElementById('timerDisplay');
    td.textContent = fmt(tState==='done'||tState==='failed' ? finalTime : seconds);
    td.classList.toggle('pulsing', tState==='running');
    setWaveColor(cfg.wC);
    document.getElementById('waveBar').classList.toggle('active', cfg.wA);
    const bottomSec = document.getElementById('bottomSection');
    bottomSec.innerHTML = '';
    if (cfg.swipe) {
      bottomSec.appendChild(buildSwipe(startTimer));
    } else {
      const pill = document.createElement('div');
      pill.className = 'bottom-pill' + (cfg.bClick ? ' clickable' : '');
      pill.style.background = cfg.bBg;
      pill.innerHTML = `<span>${cfg.bClick ? cfg.bLabel : cfg.bTxt}</span>`;
      if (cfg.bClick && cfg.bAction) pill.addEventListener('click', cfg.bAction);
      bottomSec.appendChild(pill);
      if (cfg.giveUp) {
        const btn = document.createElement('button');
        btn.className = 'give-up-btn'; btn.textContent = 'Mark as failed';
        btn.addEventListener('click', markFailed);
        bottomSec.appendChild(btn);
      }
    }
  }

  buildWave();
  render();
</script>
</body>
</html>
